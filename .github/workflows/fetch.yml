name: Fetch Polymarket Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Fetch Polymarket World Cup data
        run: python fetch_polymarket.py
      - name: Commit data
        run: |
          git config user.name bot
          git config user.email bot@local
          git add data/
          git commit -m "Update data" || echo "No changes to commit"
          git push
