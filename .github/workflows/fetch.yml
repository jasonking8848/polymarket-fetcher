name: Fetch Polymarket Data

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Fetch data
        run: python fetch_polymarket.py
      - name: Commit and push
        run: |
          git config user.name bot
          git config user.email bot@local
          git add data/
          git diff --staged --quiet || (git commit -m "Update $(date +%Y%m%d_%H%M)" && git push)
