name: Fetch Polymarket Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Fetch Polymarket data
        run: python fetch_polymarket.py
      - name: Upload data
        uses: actions/upload-artifact@v4
        with:
          name: polymarket-data
          path: data/
